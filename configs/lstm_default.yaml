seed: 42
data_dir: data
output_dir: outputs/lstm
train_file: X_train.npy
test_file: X_test.npy

debug_mode: false
debug_train_size: 100000
debug_test_size: 20000

sequence_length: 30
n_features: 4

batch_size: 4096
